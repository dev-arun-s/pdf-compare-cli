<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Diff Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --border: #2a2a30;
    --accent: #e8ff5a;
    --text: #e8e8ec;
    --muted: #666672;
    --added: rgba(80, 220, 120, 0.28);
    --removed: rgba(255, 80, 100, 0.28);
    --added-border: #50dc78;
    --removed-border: #ff5064;
    --text-added: rgba(80, 220, 120, 0.45);
    --text-removed: rgba(255, 80, 100, 0.45);
    --text-added-border: rgba(80, 220, 120, 0.9);
    --text-removed-border: rgba(255, 80, 100, 0.9);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--text); }

  .mode-tabs {
    display: flex; gap: 4px; background: var(--bg); padding: 3px;
    border-radius: 8px; border: 1px solid var(--border);
  }
  .mode-tab {
    padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none; background: transparent; color: var(--muted);
    font-family: 'Syne', sans-serif; transition: all 0.15s; white-space: nowrap;
  }
  .mode-tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .mode-tab:hover:not(.active) { color: var(--text); }

  .diff-legend { display: flex; gap: 10px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; }
  .legend-changed { background: #ffd700; }

  .controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .page-nav { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  .btn {
    background: var(--border); border: 1px solid #3a3a42; color: var(--text);
    padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: #2a2a32; border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn:disabled:hover { background: var(--border); border-color: #3a3a42; color: var(--text); }
  .btn-accent { background: var(--accent); color: #0f0f11; border-color: var(--accent); }
  .btn-accent:hover { background: #d4eb4a; border-color: #d4eb4a; color: #0f0f11; }

  /* Upload */
  .upload-area { flex: 1; display: flex; align-items: center; justify-content: center; gap: 32px; padding: 40px; }
  .drop-zone {
    flex: 1; max-width: 460px; height: 320px; border: 2px dashed var(--border);
    border-radius: 16px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(232,255,90,0.03); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 44px; opacity: 0.3; }
  .drop-label { font-size: 15px; font-weight: 700; }
  .drop-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .drop-tag { background: var(--border); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; }
  .drop-zone.loaded { border-style: solid; border-color: var(--accent); }
  .drop-zone.loaded .drop-icon { opacity: 1; font-size: 30px; }
  .vs-divider { font-size: 22px; font-weight: 800; color: var(--muted); }

  /* Viewer */
  .viewer-layout { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .viewer-layout.active { display: flex; }
  .viewer-body { flex: 1; display: flex; overflow: hidden; }

  /* Text diff sidebar */
  .text-diff-panel {
    width: 320px; flex-shrink: 0; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; background: var(--surface);
  }
  .text-diff-panel.hidden { display: none; }
  .tdp-header {
    padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 11px;
    font-family: 'DM Mono', monospace; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .tdp-scroll { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  .diff-line {
    font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.65;
    padding: 1px 6px; border-radius: 3px; margin-bottom: 1px;
    word-break: break-all; white-space: pre-wrap;
  }
  .diff-line.removed { background: rgba(255,80,100,0.12); color: #ff8090; border-left: 2px solid var(--removed-border); padding-left: 8px; }
  .diff-line.added   { background: rgba(80,220,120,0.12); color: #70e890; border-left: 2px solid var(--added-border); padding-left: 8px; }
  .diff-line.context { color: var(--muted); }
  .diff-line.header  { color: var(--accent); font-weight: 500; margin-top: 8px; font-size: 10px; letter-spacing: 0.5px; }

  /* Canvas panels */
  .viewer-panels { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
  .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; font-size: 11px;
    font-family: 'DM Mono', monospace; flex-shrink: 0;
  }
  .panel-tag { padding: 2px 7px; border-radius: 4px; font-weight: 500; font-size: 10px; }
  .tag-old { background: rgba(255,80,100,0.2); color: var(--removed-border); border: 1px solid rgba(255,80,100,0.3); }
  .tag-new { background: rgba(80,220,120,0.2); color: var(--added-border);   border: 1px solid rgba(80,220,120,0.3); }
  .panel-filename { color: var(--muted); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }

  .canvas-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px;
    background: #0a0a0c; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .canvas-wrapper { position: relative; display: block; box-shadow: 0 4px 24px rgba(0,0,0,0.6); margin: 0 auto; }
  canvas { display: block; }
  .diff-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

  .diff-rect { position: absolute; border-radius: 2px; }
  .diff-rect.text-changed  { background: rgba(255, 220, 0, 0.35);  border: 2px solid rgba(255, 200, 0, 0.9);  border-radius: 3px; box-shadow: 0 0 6px rgba(255,210,0,0.25); }
  .diff-rect.image-changed { background: rgba(255, 120, 30, 0.22); border: 2px solid rgba(255, 140, 30, 0.95); border-radius: 3px; box-shadow: 0 0 10px rgba(255,130,20,0.35); }

  .stats-bar {
    padding: 7px 14px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; gap: 16px; font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--muted); flex-shrink: 0; align-items: center;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-val { font-weight: 500; }
  .added-val { color: var(--added-border); }
  .removed-val { color: var(--removed-border); }
  .sync-badge { margin-left: auto; padding: 2px 8px; background: rgba(232,255,90,0.08); border: 1px solid rgba(232,255,90,0.2); border-radius: 10px; font-size: 10px; color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">PDF<span>diff</span></div>

  <div class="mode-tabs" id="modeTabs" style="display:none">
    <button class="mode-tab active" data-mode="both">Highlights + Sidebar</button>
    <button class="mode-tab" data-mode="highlights">Highlights only</button>
    <button class="mode-tab" data-mode="sidebar">Sidebar only</button>
  </div>

  <div class="diff-legend" id="diffLegend" style="display:none">
    <div class="legend-item"><div class="legend-dot legend-changed"></div>Changed text</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff8020"></div>Changed image</div>
  </div>

  <div class="controls">
    <div class="page-nav" id="pageNav" style="display:none">
      <button class="btn" id="prevBtn" disabled>←</button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn" id="nextBtn">→</button>
    </div>
    <button class="btn btn-accent" id="resetBtn" style="display:none">New PDFs</button>
  </div>
</header>

<!-- Upload -->
<div class="upload-area" id="uploadArea">
  <div class="drop-zone" id="drop1">
    <input type="file" accept=".pdf" id="file1" />
    <div class="drop-icon">📄</div>
    <div class="drop-label">Original PDF</div>
    <div class="drop-sub">Drop or click to upload</div>
    <div class="drop-tag">v1 · OLD</div>
  </div>
  <div class="vs-divider">VS</div>
  <div class="drop-zone" id="drop2">
    <input type="file" accept=".pdf" id="file2" />
    <div class="drop-icon">📄</div>
    <div class="drop-label">Modified PDF</div>
    <div class="drop-sub">Drop or click to upload</div>
    <div class="drop-tag">v2 · NEW</div>
  </div>
</div>

<!-- Viewer -->
<div class="viewer-layout" id="viewerLayout">
  <div class="viewer-body">

    <div class="text-diff-panel" id="textDiffPanel">
      <div class="tdp-header">
        <span>TEXT DIFF — PAGE <span id="tdpPage">1</span></span>
        <span id="tdpWordCount" style="color:var(--text)">–</span>
      </div>
      <div class="tdp-scroll" id="tdpScroll"></div>
    </div>

    <div class="viewer-panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-tag tag-old">OLD</span>
          <span class="panel-filename" id="fname1">document1.pdf</span>
        </div>
        <div class="canvas-scroll" id="scroll1">
          <div class="canvas-wrapper" id="wrapper1">
            <canvas id="canvas1"></canvas>
            <div class="diff-overlay" id="overlay1"></div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-tag tag-new">NEW</span>
          <span class="panel-filename" id="fname2">document2.pdf</span>
        </div>
        <div class="canvas-scroll" id="scroll2">
          <div class="canvas-wrapper" id="wrapper2">
            <canvas id="canvas2"></canvas>
            <div class="diff-overlay" id="overlay2"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat">Page: <span class="stat-val" id="statPage">-</span></div>
    <div class="stat">Words removed: <span class="stat-val removed-val" id="statWordRem">0</span></div>
    <div class="stat">Words added: <span class="stat-val added-val" id="statWordAdd">0</span></div>
    <div class="stat">Images changed: <span class="stat-val" id="statImgChanged" style="color:#ff8020">0</span></div>
    <div class="sync-badge">⟳ SYNCED</div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdf1 = null, pdf2 = null;
let currentPage = 1, totalPages = 1;
let isSyncing = false;
let diffMode = 'both';

// ── File loading ──────────────────────────────────────────────────────────────

function setupDropZone(dropEl, inputEl, slot) {
  dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('drag-over'); });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
  dropEl.addEventListener('drop', e => {
    e.preventDefault(); dropEl.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadFile(f, slot, dropEl);
  });
  inputEl.addEventListener('change', e => { const f = e.target.files[0]; if (f) loadFile(f, slot, dropEl); });
}

function loadFile(file, slot, dropEl) {
  const reader = new FileReader();
  reader.onload = async e => {
    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(e.target.result) }).promise;
    if (slot === 1) { pdf1 = pdf; document.getElementById('fname1').textContent = file.name; }
    else            { pdf2 = pdf; document.getElementById('fname2').textContent = file.name; }
    dropEl.classList.add('loaded');
    dropEl.querySelector('.drop-icon').textContent = '✅';
    dropEl.querySelector('.drop-label').textContent = file.name.length > 24 ? file.name.slice(0,22)+'…' : file.name;
    dropEl.querySelector('.drop-sub').textContent = `${pdf.numPages} page${pdf.numPages !== 1 ? 's' : ''}`;
    if (pdf1 && pdf2) startViewer();
  };
  reader.readAsArrayBuffer(file);
}

// ── Viewer init ───────────────────────────────────────────────────────────────

async function startViewer() {
  totalPages = Math.max(pdf1.numPages, pdf2.numPages);
  currentPage = 1;
  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('viewerLayout').classList.add('active');
  ['pageNav','diffLegend','modeTabs','resetBtn'].forEach(id => {
    document.getElementById(id).style.display = id === 'pageNav' ? 'flex' : (id === 'diffLegend' || id === 'modeTabs' ? 'flex' : 'block');
  });
  setupScrollSync();
  await renderPage(currentPage);
  updateNav();
}

function setupScrollSync() {
  const s1 = document.getElementById('scroll1'), s2 = document.getElementById('scroll2');
  const sync = (src, dst) => src.addEventListener('scroll', () => {
    if (isSyncing) return; isSyncing = true;
    dst.scrollTop = src.scrollTop; dst.scrollLeft = src.scrollLeft;
    requestAnimationFrame(() => isSyncing = false);
  });
  sync(s1, s2); sync(s2, s1);
}

// ── Page rendering ────────────────────────────────────────────────────────────

async function renderPage(pageNum) {
  document.getElementById('statPage').textContent = `${pageNum} / ${totalPages}`;
  document.getElementById('tdpPage').textContent = pageNum;

  const [r1, r2] = await Promise.all([
    renderPDFPage(pdf1, pageNum, 'canvas1', 'wrapper1', 'scroll1'),
    renderPDFPage(pdf2, pageNum, 'canvas2', 'wrapper2', 'scroll2'),
  ]);

  // Run text extraction and image bbox detection in parallel
  const [words1, words2, boxes1, boxes2] = await Promise.all([
    extractWords(pdf1, pageNum, 'scroll1'),
    extractWords(pdf2, pageNum, 'scroll2'),
    extractImageBBoxes(pdf1, pageNum, 'scroll1'),
    extractImageBBoxes(pdf2, pageNum, 'scroll2'),
  ]);

  const textDiff  = diffWords(words1, words2);
  // Image diff: uses a separate fixed-scale offscreen render for fair comparison
  const canvas1   = document.getElementById('canvas1');
  const canvas2   = document.getElementById('canvas2');
  const imageDiff = await diffImages(boxes1, boxes2, pdf1, pdf2, pageNum);

  clearOverlay('overlay1'); clearOverlay('overlay2');
  setOverlaySize('overlay1', 'canvas1'); setOverlaySize('overlay2', 'canvas2');

  if (diffMode !== 'sidebar') {
    applyWordHighlights('overlay1', textDiff.removed, r1.viewport, 'text-changed');
    applyWordHighlights('overlay2', textDiff.added,   r2.viewport, 'text-changed');
    applyImageHighlights('overlay1', imageDiff.changed1, canvas1);
    applyImageHighlights('overlay2', imageDiff.changed2, canvas2);
  }

  renderTextDiffSidebar(textDiff, imageDiff);

  document.getElementById('statWordRem').textContent    = textDiff.removed.length;
  document.getElementById('statWordAdd').textContent    = textDiff.added.length;
  document.getElementById('statImgChanged').textContent = imageDiff.count;
}

function getPanelWidth(scrollId) {
  const el = document.getElementById(scrollId);
  return Math.max(el.clientWidth - 24, 200); // subtract padding, minimum 200
}

async function renderPDFPage(pdf, pageNum, canvasId, wrapperId, scrollId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');

  if (pageNum > pdf.numPages) {
    const pw = getPanelWidth(scrollId);
    canvas.width = pw; canvas.height = Math.round(pw * 1.414);
    ctx.fillStyle = '#111114'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#444'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('(no page)', canvas.width / 2, canvas.height / 2);
    syncWrapper(wrapperId, canvas);
    return { imgData: ctx.getImageData(0, 0, canvas.width, canvas.height), viewport: null, scale: 1 };
  }

  const page = await pdf.getPage(pageNum);
  const base = page.getViewport({ scale: 1 });
  const scale = getPanelWidth(scrollId) / base.width;
  const viewport = page.getViewport({ scale });

  canvas.width  = Math.floor(viewport.width);
  canvas.height = Math.floor(viewport.height);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport }).promise;
  syncWrapper(wrapperId, canvas);
  return { imgData: ctx.getImageData(0, 0, canvas.width, canvas.height), viewport, scale };
}

function syncWrapper(wrapperId, canvas) {
  const w = document.getElementById(wrapperId);
  w.style.width = canvas.width + 'px';
  w.style.height = canvas.height + 'px';
}

// ── Text extraction ───────────────────────────────────────────────────────────
// Returns array of { str, x, y, w, h } in SCALED canvas-space coordinates

async function extractWords(pdf, pageNum, scrollId) {
  if (pageNum > pdf.numPages) return [];
  const page = await pdf.getPage(pageNum);
  const base = page.getViewport({ scale: 1 });
  const scale = getPanelWidth(scrollId) / base.width;
  const viewport = page.getViewport({ scale });
  const content = await page.getTextContent();
  const words = [];

  for (const item of content.items) {
    if (!item.str || !item.str.trim()) continue;
    const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
    const canvasX = tx[4];
    const canvasY = tx[5];
    const scaleX  = Math.sqrt(tx[0] * tx[0] + tx[1] * tx[1]);
    const scaleY  = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
    const itemW   = item.width  * scaleX;
    const itemH   = item.height * Math.abs(scaleY) || 12 * scale;
    const tokens  = item.str.split(/(\s+)/);
    const totalChars = item.str.length || 1;
    let cx = canvasX;
    for (const token of tokens) {
      const tw = (token.length / totalChars) * itemW;
      if (token.trim()) {
        words.push({ str: token.trim(), x: cx, y: canvasY - itemH, w: tw, h: itemH });
      }
      cx += tw;
    }
  }
  return words;
}

// ── Myers diff (word-level) ───────────────────────────────────────────────────

function myersDiff(a, b) {
  const n = a.length, m = b.length, max = n + m;
  const v = new Array(2 * max + 2).fill(0);
  const trace = [];

  for (let d = 0; d <= max; d++) {
    trace.push([...v]);
    for (let k = -d; k <= d; k += 2) {
      const ki = k + max;
      let x = (k === -d || (k !== d && v[ki - 1] < v[ki + 1])) ? v[ki + 1] : v[ki - 1] + 1;
      let y = x - k;
      while (x < n && y < m && a[x].toLowerCase() === b[y].toLowerCase()) { x++; y++; }
      v[ki] = x;
      if (x >= n && y >= m) return backtrack(trace, a, b, max, d);
    }
  }
  return backtrack(trace, a, b, max, max);
}

function backtrack(trace, a, b, max, d) {
  const ops = [];
  let x = a.length, y = b.length;
  for (let dd = d; dd > 0; dd--) {
    const v = trace[dd];
    const k = x - y, ki = k + max;
    const prevK = (k === -dd || (k !== dd && v[ki - 1] < v[ki + 1])) ? k + 1 : k - 1;
    const prevX = v[prevK + max], prevY = prevX - prevK;
    while (x > prevX && y > prevY) { ops.unshift({ type: 'equal', ai: x - 1, bi: y - 1 }); x--; y--; }
    if (dd > 0) {
      if (x === prevX) ops.unshift({ type: 'insert', bi: y - 1 });
      else             ops.unshift({ type: 'delete', ai: x - 1 });
    }
    x = prevX; y = prevY;
  }
  while (x > 0 && y > 0) { ops.unshift({ type: 'equal', ai: x - 1, bi: y - 1 }); x--; y--; }
  return ops;
}

function diffWords(words1, words2) {
  const s1 = words1.map(w => w.str);
  const s2 = words2.map(w => w.str);
  const ops = myersDiff(s1, s2);
  const removed = ops.filter(o => o.type === 'delete').map(o => words1[o.ai]);
  const added   = ops.filter(o => o.type === 'insert').map(o => words2[o.bi]);
  return { ops, removed, added, words1, words2 };
}

// ── Image extraction & diff ───────────────────────────────────────────────────
// Strategy: use the operator list to locate image bounding boxes on the page,
// then crop those regions directly from the already-rendered canvas for comparison.
// This is reliable for ALL image types (PNG/JPG/BMP/inline) since PDF.js has
// already decoded and composited everything onto the canvas correctly.

async function extractImageBBoxes(pdf, pageNum, scrollId) {
  if (pageNum > pdf.numPages) return [];
  const page = await pdf.getPage(pageNum);
  const base = page.getViewport({ scale: 1 });
  const scale = getPanelWidth(scrollId) / base.width;
  const viewport = page.getViewport({ scale });

  const boxes = [];
  try {
    const opList = await page.getOperatorList();
    const { OPS } = pdfjsLib;

    const stack = [];
    let ctm = [1, 0, 0, 1, 0, 0];

    const imageOps = new Set([
      OPS.paintImageXObject,
      OPS.paintInlineImageXObject,
      OPS.paintImageMaskXObject,
      OPS.paintJpegXObject,
      OPS.paintSolidColorImageMask,
    ].filter(Boolean));

    for (let i = 0; i < opList.fnArray.length; i++) {
      const fn  = opList.fnArray[i];
      const arg = opList.argsArray[i];

      if (fn === OPS.save) {
        stack.push([...ctm]);
      } else if (fn === OPS.restore) {
        ctm = stack.pop() || [1, 0, 0, 1, 0, 0];
      } else if (fn === OPS.transform) {
        ctm = mat_mul(ctm, arg);
      } else if (imageOps.has(fn)) {
        const M = mat_mul(viewport.transform, ctm);
        const corners = [[0,0],[1,0],[1,1],[0,1]].map(p => mat_apply(M, p));
        const xs = corners.map(c => c[0]), ys = corners.map(c => c[1]);
        const x = Math.min(...xs), y = Math.min(...ys);
        const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
        if (w >= 4 && h >= 4) {
          // Store as fractions of page size so we can re-apply at any render scale
          boxes.push({
            xFrac: Math.min(...xs) / viewport.width,
            yFrac: Math.min(...ys) / viewport.height,
            wFrac: w / viewport.width,
            hFrac: h / viewport.height,
          });
        }
      }
    }
  } catch (e) {
    console.warn('BBox extraction error:', e);
  }
  return boxes;
}

function mat_mul(m1, m2) {
  const [a1,b1,c1,d1,e1,f1] = m1;
  const [a2,b2,c2,d2,e2,f2] = m2;
  return [
    a1*a2 + c1*b2, b1*a2 + d1*b2,
    a1*c2 + c1*d2, b1*c2 + d1*d2,
    a1*e2 + c1*f2 + e1, b1*e2 + d1*f2 + f1,
  ];
}

function mat_apply(m, pt) {
  return [m[0]*pt[0] + m[2]*pt[1] + m[4], m[1]*pt[0] + m[3]*pt[1] + m[5]];
}

// Render a single page to an offscreen canvas at a fixed resolution for fair comparison
const IMG_COMPARE_SCALE = 1.5; // fixed scale — same for both PDFs
async function renderPageOffscreen(pdf, pageNum) {
  if (pageNum > pdf.numPages) return null;
  const page = await pdf.getPage(pageNum);
  const viewport = page.getViewport({ scale: IMG_COMPARE_SCALE });
  const canvas = document.createElement('canvas');
  canvas.width  = Math.floor(viewport.width);
  canvas.height = Math.floor(viewport.height);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport }).promise;
  return { canvas, viewport };
}

// Crop a bbox (expressed as fractions) from a canvas
function cropFrac(canvas, xFrac, yFrac, wFrac, hFrac) {
  const x = Math.round(xFrac * canvas.width);
  const y = Math.round(yFrac * canvas.height);
  const w = Math.max(1, Math.round(wFrac * canvas.width));
  const h = Math.max(1, Math.round(hFrac * canvas.height));
  const cx = Math.min(w, canvas.width  - x);
  const cy = Math.min(h, canvas.height - y);
  if (cx <= 0 || cy <= 0) return null;
  const off = document.createElement('canvas');
  off.width = cx; off.height = cy;
  off.getContext('2d').drawImage(canvas, x, y, cx, cy, 0, 0, cx, cy);
  return off;
}

// Robust image comparison: compute mean absolute difference per channel
// after normalising both crops to the same size.
function regionsDiffer(cropCanvas1, cropCanvas2) {
  const SIZE = 128; // compare at 128×128 — enough detail, removes tiny scale noise

  const c1 = document.createElement('canvas'); c1.width = c1.height = SIZE;
  const c2 = document.createElement('canvas'); c2.width = c2.height = SIZE;

  // Use crisp nearest-neighbour for black-and-white images (barcodes/QR codes),
  // and smooth for photos — imageSmoothingQuality doesn't matter much here.
  const ctx1 = c1.getContext('2d'); ctx1.imageSmoothingEnabled = true;
  const ctx2 = c2.getContext('2d'); ctx2.imageSmoothingEnabled = true;
  ctx1.drawImage(cropCanvas1, 0, 0, SIZE, SIZE);
  ctx2.drawImage(cropCanvas2, 0, 0, SIZE, SIZE);

  const d1 = ctx1.getImageData(0, 0, SIZE, SIZE).data;
  const d2 = ctx2.getImageData(0, 0, SIZE, SIZE).data;

  // Compute mean absolute difference across all pixels and channels (R,G,B only)
  let totalDiff = 0;
  const pixels = SIZE * SIZE;
  for (let i = 0; i < d1.length; i += 4) {
    totalDiff += Math.abs(d1[i]   - d2[i]);
    totalDiff += Math.abs(d1[i+1] - d2[i+1]);
    totalDiff += Math.abs(d1[i+2] - d2[i+2]);
  }
  const mad = totalDiff / (pixels * 3); // mean absolute difference, 0–255

  // Flag as different only if MAD > 8 (out of 255).
  // This is very tolerant of JPEG compression artefacts and minor rendering
  // differences, but reliably catches a changed barcode or photo.
  return mad > 8;
}

// Compare image regions using a shared fixed-scale offscreen render of each page
async function diffImages(boxes1, boxes2, pdf1, pdf2, pageNum) {
  const changed1 = [], changed2 = [];
  const len = Math.max(boxes1.length, boxes2.length);
  if (len === 0) return { changed1, changed2, count: 0 };

  // Render both pages at the same fixed scale for a fair pixel comparison
  const [off1, off2] = await Promise.all([
    renderPageOffscreen(pdf1, pageNum),
    renderPageOffscreen(pdf2, pageNum),
  ]);

  for (let i = 0; i < len; i++) {
    const b1 = boxes1[i], b2 = boxes2[i];

    if (!b1 && b2) {
      changed2.push(b2);
    } else if (b1 && !b2) {
      changed1.push(b1);
    } else {
      // Both exist — crop from the fixed-scale offscreen canvases and compare
      const crop1 = off1 ? cropFrac(off1.canvas, b1.xFrac, b1.yFrac, b1.wFrac, b1.hFrac) : null;
      const crop2 = off2 ? cropFrac(off2.canvas, b2.xFrac, b2.yFrac, b2.wFrac, b2.hFrac) : null;

      if (!crop1 || !crop2 || regionsDiffer(crop1, crop2)) {
        changed1.push(b1);
        changed2.push(b2);
      }
    }
  }

  return { changed1, changed2, count: Math.max(changed1.length, changed2.length) };
}

// Convert fractional bbox back to canvas-pixel coords for overlay rendering
function fracToPixels(box, canvas) {
  return {
    x: Math.round(box.xFrac * canvas.width),
    y: Math.round(box.yFrac * canvas.height),
    w: Math.round(box.wFrac * canvas.width),
    h: Math.round(box.hFrac * canvas.height),
  };
}

function applyImageHighlights(overlayId, rects, canvas) {
  if (!rects || !rects.length) return;
  const overlay = document.getElementById(overlayId);
  for (const r of rects) {
    const px = fracToPixels(r, canvas);
    const el = document.createElement('div');
    el.className = 'diff-rect image-changed';
    el.style.cssText = `left:${px.x}px;top:${px.y}px;width:${px.w}px;height:${px.h}px`;
    el.title = 'Image changed';
    overlay.appendChild(el);
  }
}

// ── Overlays ──────────────────────────────────────────────────────────────────

function clearOverlay(id) { document.getElementById(id).innerHTML = ''; }
function setOverlaySize(oid, cid) {
  const c = document.getElementById(cid), o = document.getElementById(oid);
  o.style.width = c.width + 'px'; o.style.height = c.height + 'px';
}

function applyWordHighlights(overlayId, wordList, viewport, cls) {
  if (!viewport || !wordList.length) return;
  const overlay = document.getElementById(overlayId);
  const PAD = 1;
  for (const word of wordList) {
    if (word.w < 1 || word.h < 1) continue;
    const el = document.createElement('div');
    el.className = `diff-rect ${cls}`;
    el.style.cssText = `left:${word.x - PAD}px;top:${word.y - PAD}px;width:${word.w + PAD * 2}px;height:${word.h + PAD * 2}px`;
    el.title = word.str;
    overlay.appendChild(el);
  }
}

// ── Text diff sidebar ─────────────────────────────────────────────────────────

function renderTextDiffSidebar(textDiff, imageDiff) {
  const scroll = document.getElementById('tdpScroll');
  const changeCount = textDiff.removed.length + textDiff.added.length;
  const imgCount = imageDiff ? imageDiff.count : 0;
  const total = changeCount + imgCount;
  document.getElementById('tdpWordCount').textContent = `${total} change${total !== 1 ? 's' : ''}`;

  const lines = [];

  // Image diff entries first
  if (imgCount > 0) {
    lines.push({ type: 'header', text: `── ${imgCount} IMAGE CHANGE${imgCount > 1 ? 'S' : ''} ──` });
    const maxShow = Math.max(imageDiff.changed1.length, imageDiff.changed2.length);
    for (let i = 0; i < maxShow; i++) {
      const r1 = imageDiff.changed1[i], r2 = imageDiff.changed2[i];
      if (r1 && !r2)       lines.push({ type: 'removed', text: `− Image ${i+1} removed` });
      else if (!r1 && r2)  lines.push({ type: 'added',   text: `+ Image ${i+1} added` });
      else                 lines.push({ type: 'added',   text: `~ Image ${i+1} content changed` });
    }
  }

  if (changeCount === 0 && imgCount === 0) {
    scroll.innerHTML = `<div class="diff-line context" style="color:var(--added-border);padding:8px 4px">✓ Pages are identical</div>`;
    return;
  }

  if (changeCount === 0) {
    scroll.innerHTML = lines.map(l => `<div class="diff-line ${l.type}">${escHtml(l.text)}</div>`).join('') +
      `<div class="diff-line context" style="color:var(--added-border);padding:6px 4px">✓ No text differences</div>`;
    return;
  }

  // Text diff entries
  const CONTEXT = 5;
  const { ops, words1, words2 } = textDiff;
  let i = 0;
  while (i < ops.length) {
    if (ops[i].type === 'equal') { i++; continue; }
    const clStart = i;
    while (i < ops.length && ops[i].type !== 'equal') i++;
    const clEnd = i;

    const before = [], after = [];
    let ci = clStart - 1, cnt = 0;
    while (ci >= 0 && ops[ci].type === 'equal' && cnt < CONTEXT) { before.unshift(words1[ops[ci].ai].str); ci--; cnt++; }
    ci = clEnd; cnt = 0;
    while (ci < ops.length && ops[ci].type === 'equal' && cnt < CONTEXT) { after.push(words1[ops[ci].ai].str); ci++; cnt++; }

    lines.push({ type: 'header', text: '── TEXT CHANGE ──' });
    if (before.length) lines.push({ type: 'context', text: (before.length < CONTEXT ? '' : '… ') + before.join(' ') });

    const delW = [], insW = [];
    for (let j = clStart; j < clEnd; j++) {
      if (ops[j].type === 'delete') delW.push(words1[ops[j].ai].str);
      if (ops[j].type === 'insert') insW.push(words2[ops[j].bi].str);
    }
    if (delW.length) lines.push({ type: 'removed', text: '− ' + delW.join(' ') });
    if (insW.length) lines.push({ type: 'added',   text: '+ ' + insW.join(' ') });
    if (after.length) lines.push({ type: 'context', text: after.join(' ') + (after.length < CONTEXT ? '' : ' …') });
  }

  scroll.innerHTML = lines.map(l =>
    `<div class="diff-line ${l.type}">${escHtml(l.text)}</div>`
  ).join('');
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Controls ──────────────────────────────────────────────────────────────────

function updateNav() {
  document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

document.getElementById('prevBtn').addEventListener('click', async () => {
  if (currentPage > 1) { currentPage--; await renderPage(currentPage); updateNav(); }
});
document.getElementById('nextBtn').addEventListener('click', async () => {
  if (currentPage < totalPages) { currentPage++; await renderPage(currentPage); updateNav(); }
});

document.addEventListener('keydown', async e => {
  if (!pdf1 || !pdf2) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentPage < totalPages) { currentPage++; await renderPage(currentPage); updateNav(); }
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentPage > 1) { currentPage--; await renderPage(currentPage); updateNav(); }
  }
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', async () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    diffMode = tab.dataset.mode;
    // Hide sidebar when highlights-only
    document.getElementById('textDiffPanel').classList.toggle('hidden', diffMode === 'highlights');
    await renderPage(currentPage);
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  pdf1 = pdf2 = null;
  document.getElementById('uploadArea').style.display = 'flex';
  document.getElementById('viewerLayout').classList.remove('active');
  ['pageNav','diffLegend','modeTabs','resetBtn'].forEach(id => document.getElementById(id).style.display = 'none');
  ['drop1','drop2'].forEach((id, i) => {
    const d = document.getElementById(id);
    d.classList.remove('loaded');
    d.querySelector('.drop-icon').textContent = '📄';
    d.querySelector('.drop-label').textContent = ['Original PDF','Modified PDF'][i];
    d.querySelector('.drop-sub').textContent = 'Drop or click to upload';
  });
  document.getElementById('file1').value = '';
  document.getElementById('file2').value = '';
  diffMode = 'both';
  document.querySelectorAll('.mode-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  document.getElementById('textDiffPanel').classList.remove('hidden');
});

setupDropZone(document.getElementById('drop1'), document.getElementById('file1'), 1);
setupDropZone(document.getElementById('drop2'), document.getElementById('file2'), 2);

// Re-render on resize so pages always fill their panels
let resizeTimer;
window.addEventListener('resize', () => {
  if (!pdf1 || !pdf2) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderPage(currentPage), 150);
});
</script>
